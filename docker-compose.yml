services:
  # ----------------------------
  # Kafka stack
  # ----------------------------
  zookeeper:
    image: zookeeper
    container_name: zookeeper
    hostname: zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
    networks:
      - bigdata

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # outside (host)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners: one for Docker network, one for host
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - bigdata

  kafka_manager:
    image: hlebalbau/kafka-manager:stable
    container_name: kafka-manager
    restart: always
    depends_on:
      - zookeeper
      - kafka
    ports:
      - "9000:9000"
    environment:
      ZK_HOSTS: "zookeeper:2181"
      APPLICATION_SECRET: "random-secret"
      KAFKA_BROKERCONNECT: "kafka:9093"
    networks:
      - bigdata

  # ----------------------------
  # ELK stack
  # ----------------------------
  elasticsearch:
    image: elasticsearch:7.16.2
    container_name: elasticsearch
    restart: always
    environment:
      ES_JAVA_OPTS: "-Xmx256m -Xms256m"
      discovery.type: single-node
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - bigdata
  
  elasticsearch-setup:
    image: curlimages/curl:latest
    container_name: elasticsearch-setup
    depends_on:
      - elasticsearch
    networks:
      - bigdata
    volumes:
      - ./elk/elasticsearch/cryptodata.json:/cryptodata.json:ro
    command: >
      sh -c "echo '⏳ Attente Elasticsearch...';
      until curl -s http://elasticsearch:9200 >/dev/null; do sleep 2; done;
      echo '✅ Elasticsearch UP';
      STATUS=$(curl -s -o /dev/null -w '%{http_code}' -I http://elasticsearch:9200/cryptodata);
      if [ \"$STATUS\" = \"200\" ]; then echo 'ℹ️ Index cryptodata existe déjà, skip.'; exit 0; fi;
      echo '📌 Création index cryptodata (mapping + edge_ngram)...';
      curl -s -X PUT http://elasticsearch:9200/cryptodata -H 'Content-Type: application/json' --data-binary @/cryptodata.json;
      echo '';
      echo '✅ Setup terminé.';"
    restart: "no"

  logstash:
    image: logstash:7.16.2
    container_name: logstash
    restart: always
    depends_on:
      - elasticsearch
      - kafka
    ports:
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
    volumes:
      - ./elk/logstash:/logstash_dir
      - ./elk/logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
    command: logstash --path.settings /usr/share/logstash/config
    networks:
      - bigdata

  kibana:
    image: kibana:7.16.2
    container_name: kibana
    restart: always
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    networks:
      - bigdata

  # ----------------------------
  # Producer (CoinGecko -> Kafka)
  # ----------------------------
  producer:
    build: ./producer
    container_name: producer
    restart: always
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
      KAFKA_TOPIC: "cryptodata"
      VS_CURRENCY: "usd"
      PER_PAGE: "50"
      POLL_SECONDS: "60"
      # optionnel
      # COINGECKO_DEMO_API_KEY: "YOUR_KEY"
    networks:
      - bigdata
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ./spark_results:/opt/spark/results
    networks:
      - bigdata

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ./spark_results:/opt/spark/results
    networks:
      - bigdata
  # ----------------------------
  # Spark analysis (lit ES, écrit results)
  # ----------------------------
  spark-submit:
    image: apache/spark:3.5.1
    container_name: spark-submit
    depends_on:
      - spark-master
      - elasticsearch
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ./spark_results:/opt/spark/results
    networks:
      - bigdata
    command: >
      bash -lc "
      set -e &&
      export HOME=/tmp &&
      mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars &&
      echo '⏳ Attente Elasticsearch...' &&
      until curl -s http://elasticsearch:9200 >/dev/null; do sleep 2; done &&
      echo '🚀 Lancement du job Spark...' &&
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.elasticsearch:elasticsearch-spark-30_2.12:7.16.2
      --conf spark.es.nodes=elasticsearch
      --conf spark.es.port=9200
      --conf spark.es.nodes.wan.only=true
      --executor-memory 1g
      --driver-memory 1g
      /opt/spark/jobs/sparkAnalysis.py"
    restart: "no"

volumes:
  elastic_data:

networks:
  bigdata: